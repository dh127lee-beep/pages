            <g transform="translate(260, 60)">
              <!-- Agent -->
              <rect x="0" y="0" width="90" height="42" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
              <text x="45" y="27" font-size="13" fill="#065f46" text-anchor="middle" font-weight="700">Agent</text>

              <path d="M45 42 L45 78" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow7)"/>

              <rect x="-10" y="82" width="110" height="56" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>

              <!-- Split -->

              <!-- Allow -->

              <text x="10" y="206" font-size="12" fill="#065f46" text-anchor="middle" font-weight="700">Approve</text>

              <!-- Block -->

              <text x="100" y="206" font-size="12" fill="#991b1b" text-anchor="middle" font-weight="700">Reject</text>
            </g>

            <!-- Human icon -->
            <g transform="translate(430, 100)">

              <path d="M0 50 Q0 28 20 28 Q40 28 40 50 L40 60 L0 60 Z" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>

            </div>
