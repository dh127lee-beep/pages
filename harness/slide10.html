<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 10 - 개선 결과</title>
  <link rel="stylesheet" href="slide.css">
</head>
<body data-current="10" data-total="12">

  <div class="slide-viewport">
    <div class="slide-page theme-exec">
      <div class="exec-header">
        <div class="exec-eyebrow">04 &middot; Results</div>
        <div class="exec-title">개선 결과</div>
        <div class="exec-subtitle">Harness Engineering 적용 이후 측정된 핵심 지표</div>
      </div>

      <div class="exec-body">
        <div class="exec-metrics">
          <div class="exec-metric">
            <div class="metric-label">작업 성공률</div>
            <div class="metric-value">97<span class="metric-unit">%</span></div>
            <div class="metric-unit">Baseline 92% &rarr; 97%</div>
          </div>
          <div class="exec-metric">
            <div class="metric-label">처리 시간</div>
            <div class="metric-value">&minus;62<span class="metric-unit">%</span></div>
            <div class="metric-unit">반복 업무 처리 시간 단축</div>
          </div>
          <div class="exec-metric">
            <div class="metric-label">멀티 스텝 완주율</div>
            <div class="metric-value">31<span class="metric-unit">step</span></div>
            <div class="metric-unit">연속 스텝 안정 수행</div>
          </div>
          <div class="exec-metric">
            <div class="metric-label">적용 시스템</div>
            <div class="metric-value">10+<span class="metric-unit"></span></div>
            <div class="metric-unit">사내 주요 시스템 대응</div>
          </div>
        </div>

        <div class="exec-cards" style="margin-top: calc(12 * var(--s) * 1px);">
          <div class="exec-card">
            <div class="card-icon"><img src="https://unpkg.com/lucide-static@latest/icons/shield-check.svg" alt=""></div>
            <div class="card-title">안정성 확보</div>
            <div class="card-desc">장시간 작업에서도 중단·복구 가능</div>
          </div>
          <div class="exec-card">
            <div class="card-icon"><img src="https://unpkg.com/lucide-static@latest/icons/layers.svg" alt=""></div>
            <div class="card-title">운영 체계 구축</div>
            <div class="card-desc">Observability + Evaluation + 자동 학습 루프</div>
          </div>
          <div class="exec-card">
            <div class="card-icon"><img src="https://unpkg.com/lucide-static@latest/icons/rocket.svg" alt=""></div>
            <div class="card-title">실무 투입 수준</div>
            <div class="card-desc">사내 시스템 적용 가능한 수준에 도달</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="slide-nav"></nav>
  <script src="slide.js"></script>
</body>
</html>
