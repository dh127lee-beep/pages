<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 2 - Agent = Model + Harness</title>
  <link rel="stylesheet" href="slide.css">
</head>
<body data-current="2" data-total="12">

  <div class="slide-viewport">
    <div class="slide-page theme-body" style="padding: calc(60 * var(--s) * 1px) calc(96 * var(--s) * 1px);">
      <div class="arch-diagram">

        <!-- Formula -->
        <div class="arch-formula">Agent Harness Engineering<br><span style="color:#3b82f6;">for Browser Agent</span></div>

        <!-- Outer Agent box -->
        <div class="agent-outer">

          <div class="agent-inner">
            <!-- Left: Harness -->
            <div class="harness-outer">
              <div class="harness-title">Harness</div>

              <div class="harness-grid">
                <div class="harness-cell">System Prompt</div>
                <div class="harness-cell">Hierarchical Skills</div>
                <div class="harness-cell">Auto Compaction</div>
                <div class="harness-cell">Memory (Short / Long Term)</div>
                <div class="harness-cell">Guardrails (+ HITL)</div>
                <div class="harness-cell">Evaluation Infra</div>
                <div class="harness-cell">Sub-agent Management</div>
                <div class="harness-cell">Hooks / Middleware</div>
                <div class="harness-cell full-width">Tools</div>
                <div class="harness-cell dashed square full-width">Web Browser</div>
              </div>
            </div>

            <!-- Plus -->
            <div class="plus-sign">+</div>

            <!-- Right: Model -->
            <div class="model-box">
              <div class="model-label">Model</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <nav class="slide-nav"></nav>
  <script src="slide.js"></script>
</body>
</html>
