<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide 4 - Two Columns</title>
  <link rel="stylesheet" href="slide.css">
</head>
<body data-current="4" data-total="7">

  <div class="slide-viewport">
    <div class="slide-page theme-two-col">
      <h2 class="slide-heading">두 열 레이아웃</h2>
      <div class="slide-divider"></div>
      <div class="columns">
        <div class="col">
          <h3>왼쪽 열</h3>
          <ul>
            <li>항목 하나를 설명합니다</li>
            <li>두 번째 항목 설명</li>
            <li>세 번째 항목 설명</li>
          </ul>
        </div>
        <div class="col">
          <h3>오른쪽 열</h3>
          <ul>
            <li>비교 또는 보충 항목</li>
            <li>두 번째 비교 항목</li>
            <li>세 번째 비교 항목</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <nav class="slide-nav"></nav>
  <script src="slide.js"></script>
</body>
</html>
