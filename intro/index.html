<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Introduction</title>
    <!-- Use Google Fonts for a modern UI (Inter fits well) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        .video-container {
            width: 100%;
            max-width: 1920px;
            aspect-ratio: 16 / 9;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .scene {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            opacity: 0;
            pointer-events: none;
        }

        /* Scene Typography */
        .title-text {
            font-size: 5vw;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.04em;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
        }

        .subtitle-text {
            font-size: 2.5vw;
            font-weight: 600;
            color: #4b5563;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
        }

        .text-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Specific Scene Elements */
        
        /* Scene 1: Browser Agent */
        .typing-text {
            font-size: 5vw;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.04em;
            display: flex;
            align-items: center;
        }
        .cursor {
            display: inline-block;
            width: 0.08em;
            height: 1.1em;
            background-color: #3b82f6;
            margin-left: 0.1em;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Generic Mockups for New Scenes */
        .mockup-container {
            width: 80%;
            height: 75%;
            background: #f8fafc;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.95);
        }

        .mockup-header {
            height: 40px;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.r { background: #ff5f56; } .dot.y { background: #ffbd2e; } .dot.g { background: #27c93f; }
        .url-bar { flex: 1; margin: 0 16px; height: 24px; background: #f1f5f9; border-radius: 4px; display: flex; align-items: center; padding: 0 12px; font-size: 12px; color: #94a3b8; font-family: monospace; }
        
        .mockup-body {
            flex: 1;
            padding: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Scene 3: Link to Your Work Site */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            width: 100%;
            height: 100%;
        }
        .app-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .app-icon { width: 48px; height: 48px; border-radius: 12px; background: #e2e8f0; }
        .app-line { height: 12px; background: #f1f5f9; border-radius: 6px; }

        /* Scene 4: Skill is All you Need */
        .skill-node-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .skill-center { width: 120px; height: 120px; border-radius: 60px; background: #3b82f6; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 24px; z-index: 2; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5); }
        .skill-orbit { position: absolute; width: 300px; height: 300px; border: 2px dashed #cbd5e1; border-radius: 50%; animation: spin 20s linear infinite; }
        .skill-item { position: absolute; width: 60px; height: 60px; border-radius: 50%; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; font-weight: 700; font-size: 12px; color: #475569; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Scene 5: Work Starts with New Tab */
        .new-tab-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            width: 100%;
        }
        .search-box {
            width: 60%;
            height: 60px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-size: 18px;
            color: #94a3b8;
        }
        .quick-links { display: flex; gap: 24px; }
        .quick-link { width: 80px; height: 80px; border-radius: 16px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Scene 6: Multi-Task & Multi-Turn */
        .split-screen {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 20px;
        }
        .chat-panel { flex: 1; background: white; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .work-panel { flex: 2; background: white; border-radius: 12px; padding: 20px; }
        .chat-bubble { padding: 12px 16px; border-radius: 16px; max-width: 80%; }
        .chat-bubble.agent { background: #f1f5f9; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-bubble.user { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* Scene 7: Search & Report */
        .report-layout {
            display: grid;
            grid-template-columns: 1fr 3fr;
            width: 100%;
            height: 100%;
            gap: 24px;
        }
        .doc-sidebar { background: white; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .doc-item { height: 24px; background: #f1f5f9; border-radius: 4px; }
        .doc-main { background: white; border-radius: 12px; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .doc-title { height: 40px; width: 60%; background: #e2e8f0; border-radius: 8px; }
        .doc-paragraph { height: 16px; width: 100%; background: #f1f5f9; border-radius: 4px; }

        /* Scene 8: Next & Coming Soon */
        .gradient-text {
            background: linear-gradient(135deg, #111827, #4b5563);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Scene 4 (Smart Personal Agent) video clips — same box size as prior mockups */
        .scene-smart-clip {
            width: 576px;
            height: 403px;
            object-fit: cover;
            background: #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #cbd5e1;
            flex-shrink: 0;
        }
        .scene-smart-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            width: 576px;
        }
        .highlight-pill {
            background: #b4d5fe;
            color: inherit;
            padding: 0.02em 0.04em;
            box-shadow: 0.04em 0 0 #b4d5fe, -0.04em 0 0 #b4d5fe;
        }
        .select-handle {
            display: inline-block;
            width: 0.08em;
            height: 1.15em;
            background: #2563eb;
            margin-left: 0.05em;
            vertical-align: -0.22em;
            position: relative;
        }
        .select-handle::before {
            content: '';
            position: absolute;
            left: 50%;
            top: -0.35em;
            transform: translateX(-50%);
            width: 0.38em;
            height: 0.38em;
            border-radius: 50%;
            background: #2563eb;
        }
        .scene-smart-caption {
            font-family: 'Nanum Pen Script', 'Inter', cursive;
            font-size: 34px;
            font-weight: 400;
            color: #111827;
            white-space: nowrap;
            line-height: 1.1;
        }
        .scene-smart-caption::before { content: '\201C'; margin-right: 0.1em; color: #94a3b8; }
        .scene-smart-caption::after { content: '\201D'; margin-left: 0.1em; color: #94a3b8; }

        /* Bottom Nav Bar (fixed to viewport so it stays visible regardless of video box size) */
        #navBar {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 20px;
            background: rgba(17, 24, 39, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #f9fafb;
            font-size: 13px;
            z-index: 200;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        #navBar.visible { display: flex; }
        #navTimer {
            font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
            font-size: 14px;
            font-weight: 600;
            color: #93c5fd;
            letter-spacing: 0.05em;
            min-width: 78px;
        }
        #navScenes {
            display: flex;
            gap: 6px;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: thin;
        }
        #navScenes::-webkit-scrollbar { height: 4px; }
        #navScenes::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        .nav-scene-btn {
            flex-shrink: 0;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            background: transparent;
            color: #e5e7eb;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, border-color 0.15s;
        }
        .nav-scene-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); }
        .nav-scene-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

    </style>
</head>
<body>

    <div class="video-container" id="videoContainer">
        
        <!-- Scene: Browser Agent is Work Partner -->
        <div class="scene" id="scene-partner" style="background:#ffffff;">
            <div id="partner-stage" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                <div id="partner-phrase" style="display:flex; flex-wrap:wrap; align-items:center; justify-content:center; font-size: 3.2vw; font-weight: 600; color:#9ca3af; letter-spacing:-0.01em; max-width:88%; text-align:center; row-gap:0.3em;"></div>
            </div>
        </div>

        <!-- Scene: Chrome Extension Side Panel Reveal -->
        <div class="scene" id="scene-extension" style="background:#f3f4f6;">
            <div id="extension-viewport" style="width:100%; height:100%; position:relative; display:flex; justify-content:center; align-items:center; overflow:hidden;">
                <div id="extension-browser" style="width: 88%; height: 82%; background:#ffffff; border-radius: 14px; box-shadow: 0 24px 60px rgba(0,0,0,0.2); overflow:hidden; display:flex; flex-direction:column;">
                    <div style="height:44px; background:#f9fafb; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; padding-left:16px;">
                        <div style="flex:1; height:24px; background:#ffffff; border:1px solid #e5e7eb; border-radius: 12px; margin-right: 16px;"></div>
                        <div id="extension-logo" style="position:relative; width:32px; height:32px; cursor:pointer; margin-right: 16px;">
                            <img src="image/extension-icon.svg" width="32" height="32" alt="" draggable="false" style="display:block;"/>
                            <div id="extension-click-ring" style="position:absolute; inset:-10px; border-radius:50%; border: 2px solid #3b82f6; opacity:0; pointer-events:none;"></div>
                        </div>
                        <div style="display:flex; align-self:stretch;">
                            <div style="width:46px; display:flex; align-items:center; justify-content:center; color:#475569; font-size:14px;">─</div>
                            <div style="width:46px; display:flex; align-items:center; justify-content:center; color:#475569; font-size:12px;">▢</div>
                            <div class="win-close-x" style="width:46px; display:flex; align-items:center; justify-content:center; color:#475569; font-size:14px;">✕</div>
                        </div>
                    </div>
                    <div style="flex:1; display:flex; min-height:0;">
                        <div style="flex:1; background:#ffffff; display:flex; flex-direction:column; gap:14px; padding: 28px;">
                            <div style="height: 18px; width: 40%; background:#e5e7eb; border-radius:4px;"></div>
                            <div style="height: 14px; width: 80%; background:#f1f5f9; border-radius:4px;"></div>
                            <div style="height: 14px; width: 72%; background:#f1f5f9; border-radius:4px;"></div>
                            <div style="height: 14px; width: 78%; background:#f1f5f9; border-radius:4px;"></div>
                            <div style="height: 14px; width: 64%; background:#f1f5f9; border-radius:4px;"></div>
                        </div>
                        <div id="extension-panel" style="height:100%; aspect-ratio: 1 / 3; flex-shrink:0; position:relative;">
                            <img src="image/extension-panel.svg" alt="" draggable="false" style="display:block; width:100%; height:100%; object-fit:cover;"/>
                            <div id="extension-chat-input" style="position:absolute; left:8%; right:8%; bottom:7.3%; height:4.9%; display:flex; align-items:center; padding: 0 14px; font-size:20px; color:#e2e8f0; font-family: Inter, sans-serif; box-sizing:border-box;">
                                <span id="extension-typed"></span><span id="extension-typed-cursor" style="display:inline-block; width:2px; height:21px; background:#93c5fd; margin-left:2px; opacity:0;"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scene: Smart Personal Agent Showcase -->
        <div class="scene" id="scene-smart" style="background:#ffffff;">
            <div style="position: absolute; top: 20%; width: 100vw; height: 55%; display: flex; align-items: center; overflow: hidden;">
                <div id="scene-smart-track" style="display: flex; gap: 40px; white-space: nowrap; width: max-content; padding: 0 calc(50vw - 288px);">
                    <div class="scene-smart-item">
                        <video src="video/atlas-easy-001.mp4" class="scene-smart-clip" autoplay muted loop playsinline></video>
                        <div class="scene-smart-caption" data-text="smart.caption.1"></div>
                    </div>
                    <div class="scene-smart-item">
                        <video src="video/atlas-easy-002.mp4" class="scene-smart-clip" autoplay muted loop playsinline></video>
                        <div class="scene-smart-caption" data-text="smart.caption.2"></div>
                    </div>
                    <div class="scene-smart-item">
                        <video src="video/claude-easy-001.mp4" class="scene-smart-clip" autoplay muted loop playsinline></video>
                        <div class="scene-smart-caption" data-text="smart.caption.3"></div>
                    </div>
                    <div class="scene-smart-item">
                        <video src="video/claude-easy-002.mp4" class="scene-smart-clip" autoplay muted loop playsinline></video>
                        <div class="scene-smart-caption" data-text="smart.caption.4"></div>
                    </div>
                    <div class="scene-smart-item">
                        <video src="video/claude-medium-002.mp4" class="scene-smart-clip" autoplay muted loop playsinline></video>
                        <div class="scene-smart-caption" data-text="smart.caption.5"></div>
                    </div>
                </div>
            </div>
            <div class="title-text st4" style="position: absolute; bottom: 15%; font-size: 3vw; opacity: 0; transform: translateY(20px);" data-text="smart.title"></div>
        </div>

        <!-- Scene: New Tab Button Zoom & Open -->
        <div class="scene" id="scene-addtab" style="background:#f3f4f6;">
            <div style="width:100%; height:100%; position:relative; display:flex; justify-content:center; align-items:center; overflow:hidden;">
                <div id="addtab-browser" style="width: 88%; height: 82%; background:#ffffff; border-radius: 14px; box-shadow: 0 24px 60px rgba(0,0,0,0.2); overflow:hidden; display:flex; flex-direction:column;">
                    <div style="height:40px; background:#e5e7eb; display:flex; align-items:flex-end; padding-left: 12px; gap:6px;">
                        <div style="display:flex; align-items:center; height:32px; background:#ffffff; border-radius:10px 10px 0 0; padding: 0 14px; gap:8px; min-width:180px;">
                            <div style="width:12px; height:12px; border-radius:50%; background:#3b82f6;"></div>
                            <div style="height:8px; width:110px; background:#cbd5e1; border-radius:3px;"></div>
                        </div>
                        <div id="addtab-new" style="display:flex; align-items:center; height:32px; background:#ffffff; border-radius:10px 10px 0 0; padding: 0 14px; gap:8px; min-width:180px; opacity:0; transform-origin: left bottom;">
                            <div style="width:12px; height:12px; border-radius:50%; background:#94a3b8;"></div>
                            <div style="height:8px; width:100px; background:#e2e8f0; border-radius:3px;"></div>
                        </div>
                        <div id="addtab-plus" style="position:relative; width:28px; height:28px; border-radius:50%; background:rgba(15,23,42,0.06); display:flex; align-items:center; justify-content:center; margin-bottom:4px; cursor:pointer;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2.4" stroke-linecap="round">
                                <path d="M12 5v14"/><path d="M5 12h14"/>
                            </svg>
                            <div id="addtab-click-ring" style="position:absolute; inset:-10px; border-radius:50%; border:2px solid #3b82f6; opacity:0; pointer-events:none;"></div>
                        </div>
                        <div style="flex:1;"></div>
                        <div style="display:flex; align-self:stretch;">
                            <div style="width:46px; display:flex; align-items:center; justify-content:center; color:#475569; font-size:14px;">─</div>
                            <div style="width:46px; display:flex; align-items:center; justify-content:center; color:#475569; font-size:12px;">▢</div>
                            <div style="width:46px; display:flex; align-items:center; justify-content:center; color:#475569; font-size:14px;">✕</div>
                        </div>
                    </div>
                    <div style="height:44px; background:#f9fafb; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; padding: 0 16px;">
                        <div style="flex:1; height:24px; background:#ffffff; border:1px solid #e5e7eb; border-radius: 12px;"></div>
                    </div>
                    <div style="flex:1; background:#ffffff; overflow:hidden;">
                        <img src="image/addtab-search.svg" alt="" draggable="false" style="display:block; width:100%; height:100%; object-fit:cover; object-position: top center;"/>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scene: Link to Your Work Site -->
        <div class="scene flex-col" id="scene-link">
            <div class="text-wrapper" style="position: absolute; top: 10%; z-index: 10;">
                <div class="title-text st6" data-text="link.title"></div>
            </div>
            <div class="mockup-container sm6" style="margin-top: 5%;">
                <div class="mockup-header">
                    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
                    <div class="url-bar" data-text="link.url"></div>
                </div>
                <div class="mockup-body">
                    <div class="grid-layout">
                        <div class="app-card"><div class="app-icon" style="background: #fbbf24;"></div><div class="app-line w-full"></div><div class="app-line w-2/3"></div></div>
                        <div class="app-card"><div class="app-icon" style="background: #60a5fa;"></div><div class="app-line w-full"></div><div class="app-line w-2/3"></div></div>
                        <div class="app-card"><div class="app-icon" style="background: #34d399;"></div><div class="app-line w-full"></div><div class="app-line w-2/3"></div></div>
                        <div class="app-card"><div class="app-icon" style="background: #f87171;"></div><div class="app-line w-full"></div><div class="app-line w-2/3"></div></div>
                        <div class="app-card"><div class="app-icon" style="background: #a78bfa;"></div><div class="app-line w-full"></div><div class="app-line w-2/3"></div></div>
                        <div class="app-card"><div class="app-icon" style="background: #fb923c;"></div><div class="app-line w-full"></div><div class="app-line w-2/3"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scene: Skill is All You Need -->
        <div class="scene flex-col" id="scene-skill">
            <div class="text-wrapper" style="position: absolute; top: 10%; z-index: 10;">
                <div class="title-text st7" data-text="skill.title"></div>
            </div>
            <div class="mockup-container sm7" style="margin-top: 5%; background: transparent; border: none; box-shadow: none;">
                <div class="skill-node-container">
                    <div class="skill-orbit"></div>
                    <div class="skill-item" style="top: -30px; left: 120px; border: 2px solid #ef4444;" data-text="skill.item.api"></div>
                    <div class="skill-item" style="bottom: 40px; left: -10px; border: 2px solid #10b981;" data-text="skill.item.db"></div>
                    <div class="skill-item" style="bottom: 40px; right: -10px; border: 2px solid #f59e0b;" data-text="skill.item.ui"></div>
                    <div class="skill-center" data-text="skill.center"></div>
                </div>
            </div>
        </div>

        <!-- Scene: Work Starts with New Tab -->
        <div class="scene flex-col" id="scene-newtab">
            <div class="text-wrapper" style="position: absolute; top: 15%; z-index: 10;">
                <div class="title-text st8" data-text="newtab.title"></div>
            </div>
            <div class="mockup-container sm8" style="margin-top: 5%; justify-content: center; align-items: center; background: white;">
                <div class="new-tab-content">
                    <div style="font-size: 48px; font-weight: 800; color: #111827;" data-text="newtab.headline"></div>
                    <div class="search-box" data-text="newtab.placeholder"></div>
                    <div class="quick-links">
                        <div class="quick-link"></div><div class="quick-link"></div><div class="quick-link"></div><div class="quick-link"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scene: Multi-Task & Multi-Turn -->
        <div class="scene flex-col" id="scene-multi">
            <div class="text-wrapper" style="position: absolute; top: 8%; z-index: 10;">
                <div class="title-text st9" data-text="multi.title"></div>
            </div>

    <!-- Inline fallback copy (also lives at data/texts.json). Needed so the page
         works under file:// where fetch is blocked by CORS. data/texts.json, if
         fetched successfully, overrides these values at runtime. -->
    <script type="application/json" id="textsInline">
    {
      "browser.typewriter": "Browser Agent",
      "partner.title": "Browser Agent is&nbsp;<span style=\"color:#3b82f6;\">Work Partner</span>",

      "newtab.placeholder": "Ask the agent anything...",

      "multi.chat.3": "Also include the UX metrics.",
      "multi.chat.4": "Added UX metrics. Updating the DB queries...",

      "multi.task.2": "Working on Task 2...",

      "report.url": "Report Generator",

      "coming.headline": "Coming Soon",

      "outro.tagline": "Building the Future of Work"
    }

    <script>
        // Text content with inline fallback (for file://) and optional fetch override
        // from data/texts.json so copy can be edited without touching HTML.
        let TEXTS = {};
        try {
            TEXTS = JSON.parse(document.getElementById("textsInline").textContent);
        } catch (e) {
            console.warn("inline texts parse failed:", e);
        }
        function applyTexts() {
            document.querySelectorAll("[data-text]").forEach(el => {
                const key = el.getAttribute("data-text");
                if (key in TEXTS) el.innerHTML = TEXTS[key];
            });
        }
        async function loadTexts() {
            // Skip fetch on file:// — would fail CORS. Inline data is already loaded.
            if (location.protocol === "file:") { applyTexts(); return; }
            try {
                const res = await fetch("data/texts.json", { cache: "no-cache" });
                TEXTS = { ...TEXTS, ...(await res.json()) };
            } catch (e) {
                console.warn("texts.json load failed, using inline fallback:", e);
            }
            applyTexts();
        }

        document.addEventListener("DOMContentLoaded", function() {
            loadTexts();
            const logoVideo = document.getElementById("logoVideo");
            const jumpControls = document.getElementById("jumpControls");
            const startScreen = document.getElementById("startScreen");
            const sceneSelect = document.getElementById("sceneSelect");

            // Populate dropdown from SCENES config
            SCENES.forEach((s, i) => {
                const opt = document.createElement("option");
                opt.value = s.key;
                const prefix = s.isLogo ? "🎬 " : "";
                opt.textContent = `${prefix}Scene ${i + 1} — ${s.label}`;
                sceneSelect.appendChild(opt);
            });

            document.getElementById("startBtn").addEventListener("click", function() {
                const key = sceneSelect.value;
                const scene = SCENE_BY_KEY[key];
                // Capture-friendly: black for 1s, then fade in
                gsap.set("#fadeOverlay", { opacity: 1 });
                jumpControls.style.display = "none";
                gsap.delayedCall(1.0, () => {
                    presentationStartMs = performance.now();
                    if (scene && scene.isLogo) {
                        logoVideo.style.opacity = "1";
                        logoVideo.play();
                    } else {
                        startScreen.style.display = "none";
                        startAnimation(key);
                    }
                    gsap.to("#fadeOverlay", { opacity: 0, duration: 1.5, ease: "power2.inOut" });
                });
            });

            // When video ends: start main animation from first non-logo scene
            logoVideo.addEventListener("ended", function() {
                gsap.to(logoVideo, { opacity: 0, duration: 0.8, onComplete: () => {
                    startScreen.style.display = "none";
                    startAnimation(FIRST_ANIM_KEY);
                }});
            });

            // Fallback: if video fails to load, go straight to animation
            logoVideo.addEventListener("error", function() {
                if (jumpControls.style.display === "none") {
                    startScreen.style.display = "none";
                    startAnimation(FIRST_ANIM_KEY);
                }
            });
        });

        // Single source of truth for scene ordering.
        // To insert a new scene, add an entry at the desired index — numbering,
        // dropdown labels, and timeline-seek lookup all update automatically.
        // - key:     stable identifier used for seek/lookup (do NOT reuse).
        // - label:   human-readable name shown in the dropdown.
        // - time:    timeline seek offset in seconds (0 = start).
        // - element: CSS selector of the scene root, or null for the logo entry.
        const SCENES = [
            { key: "logo",      label: "로고 비디오 (처음부터)",   time: 0,    element: null,               isLogo: true },
            { key: "partner",   label: "Work Partner",             time: 0,    element: "#scene-partner"  },
            { key: "extension", label: "Chrome Extension Panel",   time: 8.0,  element: "#scene-extension" },
            { key: "smart",     label: "Smart Personal Agent",     time: 19.0, element: "#scene-smart"  },
            { key: "addtab",    label: "New Tab Button",           time: 27.0, element: "#scene-addtab"   },
            { key: "link",      label: "Link to Work Site",        time: 32.5, element: "#scene-link"  },
            { key: "skill",     label: "Skill is All You Need",    time: 40.5, element: "#scene-skill"  },
            { key: "newtab",    label: "New Tab",                  time: 48.5, element: "#scene-newtab"  },
            { key: "multi",     label: "Multi-Task",               time: 56.5, element: "#scene-multi"  },
            { key: "report",    label: "Search & Report",          time: 64.5, element: "#scene-report" },
            { key: "coming",    label: "Coming Soon",              time: 72.5, element: "#scene-coming" },
            { key: "outro",     label: "AX Team Outro",            time: 80.5, element: "#scene-outro" },
        ];
        const SCENE_BY_KEY = Object.fromEntries(SCENES.map(s => [s.key, s]));
        // Key used to start the post-logo animation (first non-logo entry).
        const FIRST_ANIM_KEY = SCENES.find(s => !s.isLogo).key;

        // Timeline reference (set when animation starts) so nav bar can control seeks.
        let activeTimeline = null;
        // Wall-clock start (set when user clicks Start) so timer covers logo phase too.
        let presentationStartMs = null;

        function formatTime(sec) {
            sec = Math.max(0, sec);
            const m = String(Math.floor(sec / 60)).padStart(2, "0");
            const s = String(Math.floor(sec % 60)).padStart(2, "0");
            const ms = String(Math.floor((sec % 1) * 100)).padStart(2, "0");
            return `${m}:${s}:${ms}`;
        }

        function initNavBar() {
            const navBar = document.getElementById("navBar");
            const navScenes = document.getElementById("navScenes");
            const navTimer = document.getElementById("navTimer");

            // Build scene jump buttons (logo entry is shown but not seekable)
            navScenes.innerHTML = "";
            SCENES.forEach((s, i) => {
                const btn = document.createElement("button");
                btn.className = "nav-scene-btn";
                btn.dataset.key = s.key;
                btn.textContent = `${i + 1}. ${s.label}`;
                if (s.isLogo) {
                    btn.disabled = true;
                    btn.style.opacity = "0.6";
                    btn.style.cursor = "default";
                } else {
                    btn.addEventListener("click", () => {
                        if (!activeTimeline) return;
                        activeTimeline.seek(s.time, false);
                    });
                }
                navScenes.appendChild(btn);
            });

            // Restart: simplest reliable reset — reload to the start screen
            const restartBtn = document.getElementById("navRestart");
            restartBtn.onclick = () => location.reload();

            navBar.classList.add("visible");

            // Timer + active-button update, driven by gsap ticker (~60fps).
            // Timer counts wall-clock time from Start click (covers logo phase too).
            const btns = Array.from(navScenes.querySelectorAll(".nav-scene-btn"));
            const logoIdx = SCENES.findIndex(s => s.isLogo);
            gsap.ticker.add(() => {
                const elapsed = presentationStartMs == null
                    ? 0
                    : (performance.now() - presentationStartMs) / 1000;
                navTimer.textContent = formatTime(elapsed);

                let activeIdx = logoIdx >= 0 ? logoIdx : 0;
                if (activeTimeline) {
                    const t = activeTimeline.time();
                    for (let i = 0; i < SCENES.length; i++) {
                        if (SCENES[i].isLogo) continue;
                        if (SCENES[i].time <= t + 0.001) activeIdx = i;
                    }
                }
                btns.forEach((b, i) => b.classList.toggle("active", i === activeIdx));
            });
        }

        // Initialize nav bar immediately so it's visible during the logo phase.
        document.addEventListener("DOMContentLoaded", initNavBar);

        function startAnimation(startScene) {
            const tl = gsap.timeline({
                onComplete: () => {},
                paused: false
            });
            activeTimeline = tl;

            const introAudio = document.getElementById("introSound");
            const bgmAudio = document.getElementById("bgmSound");

            // Play Intro impact sound
            introAudio.volume = 1.0;
            introAudio.play().catch(e => console.log("Audio play blocked by browser. User interaction may be required: ", e));
            
            // Play background ambient
            bgmAudio.volume = 0; // Start at 0 and fade in
            bgmAudio.play().catch(e => console.log("Audio play blocked", e));
            
            // Fade out intro slowly over 4 seconds, fade in BG music slowly to a lower volume
            gsap.to(introAudio, { volume: 0, duration: 4, ease: "power2.inOut" });
            gsap.to(bgmAudio, { volume: 0.3, duration: 4, ease: "power2.inOut", delay: 1 });

            // Build partner phrase grouped by words (stagger reveal, acronym collapse)
            (function buildPartnerPhrase() {
                const phrase = "Browser Agent In Your Work for AI Transformation";
                const acrIdx = new Set([0, 8, 14, 17, 22]);
                const words = [
                    [0, 6],   [8, 12],  [14, 15], [17, 20], [22, 25],
                    [27, 29], [31, 32], [34, 47],
                ];
                const accentFrom = 5;     // "for" onward in accent color
                const breakBefore = 5;    // line break before "for"
                const container = document.getElementById("partner-phrase");
                if (!container) return;
                container.innerHTML = "";
                words.forEach((range, w) => {
                    if (w === breakBefore) {
                        const br = document.createElement("div");
                        br.id = "partner-break";
                        br.style.flexBasis = "100%";
                        br.style.height = "0";
                        container.appendChild(br);
                    }
                    const word = document.createElement("span");
                    const isAccent = w >= accentFrom;
                    word.className = "partner-word" + (isAccent ? " line2" : " line1");
                    word.style.display = "inline-flex";
                    word.style.alignItems = "center";
                    word.style.marginRight = "0.28em";
                    if (isAccent) {
                        word.style.color = "#3b82f6";
                        word.style.opacity = "0";
                    } else {
                        word.style.color = "#111827";
                        word.style.fontWeight = "700";
                        word.style.fontSize = "1.4em";
                    }
                    for (let i = range[0]; i <= range[1]; i++) {
                        const span = document.createElement("span");
                        span.textContent = phrase[i];
                        span.style.display = "inline-block";
                        span.style.transformOrigin = "center center";
                        if (!isAccent) span.style.opacity = "0";
                        let cls = acrIdx.has(i) ? "partner-acr" : "partner-other";
                        if (!isAccent) cls += " partner-letter";
                        span.className = cls;
                        word.appendChild(span);
                    }
                    container.appendChild(word);
                });
                // Suffix "in Browser" rendered inline, hidden until reveal
                const suffix = document.createElement("span");
                suffix.id = "partner-suffix";
                suffix.style.display = "inline-flex";
                suffix.style.alignItems = "baseline";
                suffix.style.gap = "0.25em";
                suffix.style.marginLeft = "0.25em";
                suffix.style.opacity = "0";
                suffix.style.maxWidth = "0";
                suffix.style.overflow = "hidden";
                suffix.style.whiteSpace = "nowrap";
                suffix.style.fontSize = "7vw";
                suffix.style.fontWeight = "800";
                suffix.style.letterSpacing = "-0.03em";
                suffix.style.color = "#111827";
                suffix.innerHTML = '<span style="color:#9ca3af; font-weight:500; font-size:0.5em;">in</span><span>Browser</span>';
                container.appendChild(suffix);
            })();

            // Setup
            gsap.set(".scene", { opacity: 0 });
            gsap.set("#scene-partner", { opacity: 1 });
            gsap.set("#scene-extension", { opacity: 0 });
            gsap.set("#extension-browser", { transformOrigin: "top right", scale: 5.0, xPercent: -18, yPercent: 28 });
            gsap.set("#extension-panel", { xPercent: 100 });
            gsap.set("#extension-click-ring", { opacity: 0, scale: 0.5 });
            gsap.set("#scene-addtab", { opacity: 0 });
            gsap.set("#scene-smart", { opacity: 1, xPercent: 100 });

            // 1. Partner scene: line 1 types in, line 2 appears at once
            tl.to({}, { duration: 0.4 })
              .to(".partner-letter", { opacity: 1, duration: 0.06, stagger: 0.05, ease: "none" })
              .to(".partner-word.line2", { opacity: 1, duration: 0.6, ease: "power2.out" }, "+=0.2")
              .to({}, { duration: 0.9 })
              // Capture widths then collapse non-acronym letters
              .call(() => {
                  document.querySelectorAll("#partner-phrase .partner-other").forEach(el => {
                      el.style.width = el.offsetWidth + "px";
                  });
              })
              .to(".partner-other", { opacity: 0, duration: 0.5, stagger: 0.01 })
              .to(".partner-other", { width: 0, duration: 0.8, ease: "expo.inOut" }, "-=0.3")
              // Scale up acronym letters
              .to(".partner-acr", { fontSize: "7vw", color: "#111827", fontWeight: 800, duration: 0.8, ease: "power3.out" }, "-=0.7")
              // Close gaps between words so acronym letters sit contiguous
              .to(".partner-word", { marginRight: 0, duration: 0.5, ease: "power2.inOut" }, "-=0.7")
              // Collapse the line break so acronym sits on a single centered line
              .to("#partner-break", { flexBasis: 0, duration: 0.4, ease: "power2.inOut" }, "-=0.6")
              .to({}, { duration: 0.6 })
              // Reveal "in Browser" suffix after the acronym (stays centered in stage)
              .to("#partner-suffix", { maxWidth: "40vw", opacity: 1, duration: 0.8, ease: "expo.out" })
              .to({}, { duration: 2.0 })

              // Partner fades out before extension scene
              .to("#scene-partner", { opacity: 0, duration: 0.5 })
              .set("#scene-extension", { opacity: 1 })

              // Chrome Extension: zoom-in corner → click → side panel → zoom-out (1.5x slower)
              .to({}, { duration: 0.9 })
              .to("#extension-click-ring", { opacity: 1, scale: 1.5, duration: 0.9, ease: "power2.out" })
              .to("#extension-click-ring", { opacity: 0, duration: 0.45 }, "-=0.15")
              .to("#extension-panel", { xPercent: 0, duration: 1.35, ease: "expo.out" }, "-=0.6")
              .to("#extension-browser", { scale: 1, xPercent: 0, yPercent: 0, duration: 2.1, ease: "expo.inOut" }, "-=0.9")
              .to({}, { duration: 0.5 })
              // Zoom into chat input at bottom of side panel
              .to("#extension-browser", { transformOrigin: "bottom right", scale: 3.0, xPercent: -6, yPercent: 6, duration: 1.4, ease: "expo.inOut" })
              .to("#extension-typed-cursor", { opacity: 1, duration: 0.1 })
              .call(() => {
                  const msg = "오늘 오후 2시 일정 추가해줘";
                  const el = document.getElementById("extension-typed");
                  el.textContent = "";
                  let i = 0;
                  const iv = setInterval(() => {
                      if (i >= msg.length) { clearInterval(iv); return; }
                      el.textContent += msg[i++];
                  }, 110);
              })
              // Hold while typing plays out (~14 chars * 0.11s ≈ 1.55s) + read time
              .to({}, { duration: 2.8 })
              .to("#extension-typed-cursor", { opacity: 0, duration: 0.2 })
              .to({}, { duration: 0.4 })
              .to("#scene-extension", { opacity: 0, duration: 0.75 }, "trans2-=0.6")

              // Transition → Smart scene
              .to("#scene-smart", { xPercent: 0, duration: 0.8, ease: "expo.inOut" }, "trans2")
              .to(".st4", { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, "trans2+=0.6")
              
              // Scene 1B track: Snap & Drift multiple screens
              // Note: item width 576 + gap 40 = 616px per item jump
              .to("#scene-smart-track", { x: -60, duration: 1.2, ease: "linear" }, "trans2+=0.8") // Drift item 1
              .to("#scene-smart-track", { x: -616, duration: 0.7, ease: "expo.inOut" }) // Snap item 2
              .to("#scene-smart-track", { x: -676, duration: 1.2, ease: "linear" }) // Drift item 2
              .to("#scene-smart-track", { x: -1232, duration: 0.7, ease: "expo.inOut" }) // Snap item 3
              .to("#scene-smart-track", { x: -1292, duration: 1.2, ease: "linear" }) // Drift item 3
              .to("#scene-smart-track", { x: -1848, duration: 0.7, ease: "expo.inOut" }) // Snap item 4
              .to("#scene-smart-track", { x: -1908, duration: 1.2, ease: "linear" }) // Drift item 4
              .to("#scene-smart-track", { x: -2464, duration: 0.7, ease: "expo.inOut" }) // Snap item 5
              .to("#scene-smart-track", { x: -2524, duration: 1.2, ease: "linear" }) // Drift item 5

              .to({}, { duration: 0.5 })

              // Smart fades out before addtab scene
              .to("#scene-smart", { opacity: 0, duration: 0.5 })
              .set("#scene-addtab", { opacity: 1 })

              // New Tab: zoom into + button → click → new tab appears → zoom out (1.5x slower)
              .set("#addtab-browser", { transformOrigin: "top left", scale: 3.4, xPercent: -28, yPercent: 25 })
              .set("#addtab-new", { opacity: 0, scaleX: 0.2 })
              .set("#addtab-click-ring", { opacity: 0, scale: 0.5 })
              .to({}, { duration: 0.75 })
              .to("#addtab-click-ring", { opacity: 1, scale: 1.5, duration: 0.825, ease: "power2.out" })
              .to("#addtab-click-ring", { opacity: 0, duration: 0.45 }, "-=0.15")
              .to("#addtab-new", { opacity: 1, scaleX: 1, duration: 0.825, ease: "back.out(1.6)" }, "-=0.5")
              .to("#addtab-browser", { scale: 1, xPercent: 0, yPercent: 0, duration: 1.95, ease: "expo.inOut" }, "-=0.45")
              .to({}, { duration: 0.6 })
              .to("#scene-addtab", { opacity: 0, duration: 0.75 });

            // Helper for Text & Mockup Scenes
            function animateScene(sceneId, textClass, mockupClass) {
                tl.to(sceneId, { opacity: 1, duration: 0.1 })
                  .to(textClass, { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" })
                  .to(mockupClass, { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.2)" }, "-=0.4")
                  .to({}, { duration: 3 }) // Hold scene reading time
                  .to(mockupClass, { opacity: 0, y: 20, duration: 0.6 })
                  .to(textClass, { opacity: 0, y: -20, duration: 0.6 }, "-=0.4")
                  .to(sceneId, { opacity: 0, duration: 0.1 });
            }

            // 3. Link to Your Work Site
            animateScene("#scene-link", ".st6", ".sm6");

            // 4. Skill is All you Need
            animateScene("#scene-skill", ".st7", ".sm7");

            // 5. Work Starts with New Tab
            animateScene("#scene-newtab", ".st8", ".sm8");

            // 6. Multi-Task & Multi-Turn
            animateScene("#scene-multi", ".st9", ".sm9");

            // 7. Search & Report
            animateScene("#scene-report", ".st10", ".sm10");

            // 8. Next & Coming Soon
            tl.to("#scene-coming", { opacity: 1, duration: 0.5 })
              .to(".st11", { opacity: 1, y: 0, duration: 1, ease: "power3.out" })
              .to({}, { duration: 1.5 })
              .to(".st12", { opacity: 1, y: 0, duration: 1.5, ease: "back.out(1.2)" })
              .to({}, { duration: 2.0 })
              .to("#scene-coming", { opacity: 0, duration: 0.8 });

            // 9. AX Team Outro
            tl.set("#scene-outro", { opacity: 1 })
              // Rings fade in slowly
              .to(["#ring1", "#ring2", "#ring3"], { opacity: 1, duration: 1.5, ease: "power2.out", stagger: 0.3 }, "outro")
              // Logo flips in from 3D (rotateX) then overshoots scale and settles
              .to("#outro-logo", {
                  opacity: 1,
                  scale: 1.4,
                  rotateX: 0,
                  duration: 0.9,
                  ease: "expo.out"
              }, "outro+=0.2")
              // Settle: scale down from big to final size
              .to("#outro-logo", {
                  scale: 1,
                  duration: 0.7,
                  ease: "back.inOut(2)"
              })
              // Line sweeps in
              .to("#outro-line", { opacity: 1, width: "60%", duration: 0.8, ease: "power2.out" }, "outro+=1.4")
              // Tagline fades in
              .to("#outro-tagline", { opacity: 1, duration: 0.8, ease: "power2.out" }, "outro+=2.0")
              // Rings slowly pulse outward
              .to("#ring1", { scale: 1.05, duration: 3, ease: "sine.inOut", yoyo: true, repeat: -1 }, "outro+=0.5")
              .to("#ring2", { scale: 1.03, duration: 4, ease: "sine.inOut", yoyo: true, repeat: -1 }, "outro+=0.5")
              // Fade out bgm
              .to(bgmAudio, { volume: 0, duration: 3, ease: "power2.inOut" }, "outro+=1.5")
              // Fade-out to black at the very end
              .to("#fadeOverlay", { opacity: 1, duration: 2.0, ease: "power2.inOut" }, "outro+=2.5");

            // Jump to the selected scene if needed
            const target = SCENE_BY_KEY[startScene];
            if (target && !target.isLogo && target.time > 0) {
                tl.seek(target.time, false);
            }
        }
    </script>
</body>
</html>
